name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 10 * * *'  # daily at 10:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          # Hit a real table so the Postgres DB registers activity (prevents auto-pause),
          # not just the REST gateway. HEAD with limit=0 keeps it cheap.
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/domains?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null && echo "Supabase is alive" || echo "Ping returned non-2xx (project may be paused)"
