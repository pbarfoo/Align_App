name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 10 * * *'  # daily at 10:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "https://qnkjunakzytvutikhlwq.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null && echo "Supabase is alive" || echo "Ping returned non-2xx (project may be paused)"
